# ----------------------------------------------------------
# PaperPilot - full stack
#   - qdrant            (vector DB)
#   - langfuse-web      (observability UI)
#   - langfuse-worker   (langfuse async workers)
#   - postgres          (langfuse metadata)
#   - clickhouse        (langfuse traces)
#   - redis             (langfuse queue)
#   - minio             (langfuse blob storage)
#   - app               (chainlit + multi-agent + retrieval)
#
# Phase 1 - Drive-Agnostic Portability:
#   ALL state uses LOCAL BIND MOUNTS under ./data/.
#   No Docker named volumes - copy the entire project directory
#   to any machine or external drive and state is fully preserved.
# ----------------------------------------------------------
version: "3.8"

services:
  # --- Vector DB ------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: paperpilot-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / dashboard
      - "6334:6334"   # gRPC
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s   # HDD startup can be slow; don't count failures yet

  # --- Langfuse infra -------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: paperpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: paperpilot-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DB: default
    volumes:
      - ch_data:/var/lib/clickhouse          # named volume - Windows bind mounts block utimes()
      - ch_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=${CLICKHOUSE_USER:-clickhouse} --password=${CLICKHOUSE_PASSWORD:-clickhouse} --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s   # ClickHouse is the slowest to initialise

  redis:
    image: redis:7-alpine
    container_name: paperpilot-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass my-redis-password
    volumes:
      - ./data/redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "my-redis-password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio
    container_name: paperpilot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    ports:
      - "9090:9000"   # S3 API
      - "9091:9001"   # console
    volumes:
      - ./data/minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  # Creates the 'langfuse' bucket in MinIO on first start.
  # Exits immediately after; restart: on-failure is intentional (idempotent).
  minio-init:
    image: minio/mc
    container_name: paperpilot-minio-init
    restart: on-failure
    depends_on:
      minio: {condition: service_healthy}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minio} $${MINIO_ROOT_PASSWORD:-miniosecret} &&
        mc mb --ignore-existing local/langfuse &&
        echo 'MinIO bucket langfuse ready.'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}

  langfuse-worker:
    image: langfuse/langfuse-worker:latest
    container_name: paperpilot-langfuse-worker
    restart: unless-stopped
    depends_on:
      postgres:   {condition: service_healthy}
      clickhouse: {condition: service_healthy}
      redis:      {condition: service_healthy}
      minio:      {condition: service_healthy}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: my-redis-password
      SALT: ${SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

  langfuse-web:
    image: langfuse/langfuse:latest
    container_name: paperpilot-langfuse-web
    restart: unless-stopped
    depends_on:
      langfuse-worker: {condition: service_started}
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: my-redis-password
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      SALT: ${SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: "paperpilot-org"
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-PaperPilot}
      LANGFUSE_INIT_PROJECT_ID: "paperpilot-proj-001"
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-paperpilot}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "pk-lf-paperpilot-2026-pub"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "sk-lf-paperpilot-2026-sec"
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@paperpilot.local}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-PaperPilot2026!}

  # --- PaperPilot app -------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paperpilot-app
    restart: unless-stopped
    depends_on:
      qdrant:       {condition: service_healthy}
      langfuse-web: {condition: service_started}
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      LANGFUSE_HOST: http://langfuse-web:3000
      PYTHONPATH: /app/src
      CHAINLIT_AUTH_SECRET: paperpilot-jwt-secret-2026-internal
      # Persist the reranker model (BAAI/bge-reranker-base ~280 MB) across
      # container rebuilds via the bind-mounted data/ directory.
      HF_HOME: /app/data/.hf_cache
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./public:/app/public
      - ./.chainlit:/app/.chainlit
      - ./chainlit.md:/app/chainlit.md
      - chainlit_db:/app/chainlit_db   # Named volume: SQLite lives here (Linux FS, no Windows locking issues)
    command: ["chainlit", "run", "src/paperpilot/server/chainlit_app.py", "--host", "0.0.0.0", "--port", "8000", "--headless"]

volumes:
  pg_data:      # Named volume for Postgres - Windows bind mounts don't support POSIX chmod
  ch_data:      # Named volume for ClickHouse - same reason (utimes() blocked on NTFS bind mounts)
  ch_logs:
  chainlit_db:  # Named volume for Chainlit SQLite DB - Windows NTFS bind mounts break SQLite locking
